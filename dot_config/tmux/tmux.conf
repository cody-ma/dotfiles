# remap prefix to ctrl-f
set -g prefix C-f
unbind C-b
bind C-f send-prefix

# remap split window
unbind %
unbind \"
bind | split-window -h
bind - split-window -v

# force a reload of the config file
unbind r
bind r source-file ~/.config/tmux/tmux.conf\; display "Reloaded conf"

# easier window nav
bind C-p previous-window
bind C-n next-window

# move window left/right and follow
bind -n C-S-Left { swap-window -d -t -1 }
bind -n C-S-Right { swap-window -d -t +1 }

# Start window and pane indexing at 1
set -g base-index 1
set -g pane-base-index 1

# auto renumber windows
set-option -g renumber-windows on

# allow mouse to select pane
setw -g mouse on

# Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'
# Sensible tmux defaults
set -g @plugin 'tmux-plugins/tmux-sensible'
# vim tmux navigation
set -g @plugin 'christoomey/vim-tmux-navigator'
# gruvbox color theme
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark' # or 'light'
# persist sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# yank to system clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
